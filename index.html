<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manbaga - Prenotazione Tavoli</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap');

        :root {
            --bg-color: #050505;
            --accent-red: #ef4444;
            --text-gray: #888;
            --text-light: #f5f5f5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="400" height="400" fill="%23050505" filter="url(%23noise)" opacity="0.03"/></svg>');
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 42px; font-weight: 900; font-style: italic; letter-spacing: -3px; }
        .logo span { color: var(--text-light); }
        .logo .red { color: var(--accent-red); }

        /* Griglia Tavoli */
        .grid-tavoli {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .tavolo {
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(40, 40, 40, 0.6) 100%);
            border: 1px solid rgba(100, 100, 100, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tavolo:hover { border-color: var(--accent-red); transform: translateY(-5px); }

        .tavolo.occupato {
            border: 2px solid var(--accent-red);
            background: rgba(40, 15, 15, 0.8);
            cursor: default;
        }

        .tavolo-num { font-size: 2rem; font-weight: 600; }
        .tavolo-label { font-size: 10px; color: var(--accent-red); letter-spacing: 1px; }

        /* Modal e Form */
        #auth-overlay, #form-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: #0a0a0a; padding: 40px; border-radius: 15px;
            border: 1px solid rgba(239, 68, 68, 0.2); width: 100%; max-width: 400px;
        }

        input, select {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #151515; border: 1px solid #333; color: white; border-radius: 6px;
        }

        button {
            width: 100%; padding: 12px; background: var(--accent-red);
            border: none; color: black; font-weight: bold; cursor: pointer; border-radius: 6px;
            margin-top: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="modal">
            <div class="logo" style="text-align: center; margin-bottom: 20px;">
                <span>MAN</span><span class="red">B</span><span>AGA</span>
            </div>
            <h3 id="auth-title">ACCEDI</h3>
            <div id="error-msg" style="color: red; font-size: 12px; margin-bottom: 10px;"></div>
            <input type="text" id="reg-nome" class="hidden" placeholder="Il tuo nome">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()">CONTINUA</button>
            <p style="font-size: 11px; text-align: center; cursor: pointer;" onclick="toggleAuthMode()">
                Non hai un account? Registrati
            </p>
        </div>
    </div>

    <div id="app" class="container hidden">
        <header>
            <div class="logo"><span>MAN</span><span class="red">B</span><span>AGA</span></div>
            <p>FUMETTERIA - PRENOTAZIONE TAVOLI</p>
            <div id="user-info" style="font-size: 12px; color: var(--accent-red);"></div>
            <button onclick="logout()" style="width: auto; padding: 5px 15px; font-size: 10px;">ESCI</button>
        </header>

        <div class="grid-tavoli" id="grid-tavoli">
            </div>
    </div>

    <div id="form-overlay" class="hidden">
        <div class="modal">
            <h2 id="tavolo-selected-title">TAVOLO</h2>
            <input type="text" id="pren-nome" placeholder="Nome Prenotazione">
            <input type="time" id="pren-orario">
            <select id="pren-persone">
                <option value="1">1 Persona</option>
                <option value="2">2 Persone</option>
            </select>
            <button onclick="confermaPrenotazione()">CONFERMA</button>
            <button onclick="chiudiForm()" style="background: #333; color: white;">ANNULLA</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCG0-J2wxZGSz6eDh_E-aAe2uvpTGLmXz0",
            authDomain: "prenotazioninegozio-65eb1.firebaseapp.com",
            projectId: "prenotazioninegozio-65eb1",
            databaseURL: "https://prenotazioninegozio-65eb1-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "prenotazioninegozio-65eb1.firebasestorage.app",
            messagingSenderId: "466874129336",
            appId: "1:466874129336:web:fd07925523c35921fe8d4d"
        };

        // Inizializzazione
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isRegistrazione = false;
        let tavoloCorrente = null;
        let utenteDati = null;

        // Disegna i tavoli vuoti all'avvio
        function disegnaTavoli(prenotazioni = {}) {
            const grid = document.getElementById('grid-tavoli');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 16; i++) {
                const pren = Object.values(prenotazioni).find(p => p.tavolo == i);
                const div = document.createElement('div');
                div.className = `tavolo ${pren ? 'occupato' : ''}`;
                div.onclick = () => pren ? null : apriForm(i);
                
                div.innerHTML = `
                    <div class="tavolo-label">TABLE</div>
                    <div class="tavolo-num">${i}</div>
                    <div style="font-size: 8px;">${pren ? pren.nome + ' (' + pren.orario + ')' : 'PRENOTA'}</div>
                `;
                grid.appendChild(div);
            }
        }

        // Gestione Login/Registrazione
        function toggleAuthMode() {
            isRegistrazione = !isRegistrazione;
            document.getElementById('auth-title').innerText = isRegistrazione ? 'REGISTRATI' : 'ACCEDI';
            document.getElementById('reg-nome').classList.toggle('hidden');
        }

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const nome = document.getElementById('reg-nome').value;

            if (isRegistrazione) {
                auth.createUserWithEmailAndPassword(email, pass)
                    .then(res => {
                        db.ref('utenti/' + res.user.uid).set({ nome: nome, email: email });
                    }).catch(err => document.getElementById('error-msg').innerText = err.message);
            } else {
                auth.signInWithEmailAndPassword(email, pass)
                    .catch(err => document.getElementById('error-msg').innerText = "Credenziali errate");
            }
        }

        // Osserva lo stato dell'utente
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                db.ref('utenti/' + user.uid).once('value', s => {
                    utenteDati = s.val();
                    document.getElementById('user-info').innerText = "Benvenuto, " + (utenteDati?.nome || 'Utente');
                });
                // Carica prenotazioni in tempo reale
                db.ref('prenotazioni').on('value', s => disegnaTavoli(s.val() || {}));
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        // Funzioni Prenotazione
        function apriForm(id) {
            tavoloCorrente = id;
            document.getElementById('tavolo-selected-title').innerText = "TAVOLO " + id;
            document.getElementById('form-overlay').classList.remove('hidden');
        }

        function chiudiForm() { document.getElementById('form-overlay').classList.add('hidden'); }

        function confermaPrenotazione() {
            const nome = document.getElementById('pren-nome').value;
            const orario = document.getElementById('pren-orario').value;
            const persone = document.getElementById('pren-persone').value;

            if (!nome || !orario) return alert("Compila tutto");

            const id = Date.now();
            db.ref('prenotazioni/' + id).set({
                tavolo: tavoloCorrente,
                nome: nome,
                orario: orario,
                persone: persone,
                utenteId: auth.currentUser.uid
            }).then(() => {
                chiudiForm();
                document.getElementById('pren-nome').value = '';
            });
        }

        function logout() { auth.signOut(); }

        // Primo disegno dei tavoli (vuoti)
        disegnaTavoli();
    </script>
</body>
</html>
