<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manbaga - Prenotazione Tavoli</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { background-color: #050505; color: #f5f5f5; font-family: 'JetBrains Mono', monospace; }
        .grain { background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="400" height="400" fill="%23050505" filter="url(%23noise)" opacity="0.03"/></svg>'); }
        .btn-primary { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4); }
        .tavolo-item { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn.active { color: #ef4444; border-bottom: 2px solid #ef4444; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="grain min-h-screen">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-5">
        <div class="w-full max-w-[400px] p-10 rounded-xl bg-[#0a0a0a] border border-red-500/20">
            <div class="text-center mb-8">
                <div class="text-[40px] font-black italic tracking-tighter text-white">MAN<span class="text-red-500">B</span>AGA</div>
                <p id="auth-title" class="text-red-500 text-[10px] tracking-widest font-bold">ACCEDI</p>
            </div>
            <div class="grid gap-4">
                <input type="text" id="reg-nome" class="hidden p-3 rounded bg-white/5 border border-white/10" placeholder="IL TUO NOME">
                <input type="email" id="email" class="p-3 rounded bg-white/5 border border-white/10" placeholder="EMAIL">
                <input type="password" id="password" class="p-3 rounded bg-white/5 border border-white/10" placeholder="PASSWORD">
                <button onclick="handleAuthSubmit()" class="btn-primary p-3 rounded font-bold">ENTRA</button>
                <button onclick="toggleAuthMode()" class="text-[10px] text-gray-500 uppercase">Cambia modalità</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header class="p-6 border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="text-xl font-black italic">MAN<span class="text-red-500">B</span>AGA</div>
                <div id="display-nome" class="text-[10px] text-red-500 font-bold uppercase"></div>
                <button onclick="logout()" class="text-gray-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6">
            <div class="flex gap-6 mb-8 border-b border-white/5">
                <button onclick="switchTab('tavoli')" id="tab-tav" class="tab-btn active pb-4 text-xs font-bold">TAVOLI</button>
                <button onclick="switchTab('prenotazioni')" id="tab-pre" class="tab-btn pb-4 text-xs font-bold uppercase">Mie Prenotazioni (<span id="count-pre">0</span>)</button>
            </div>

            <div id="view-tavoli">
                <div id="grid-tavoli" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-3"></div>
            </div>

            <div id="view-prenotazioni" class="hidden">
                <div id="lista-prenotazioni" class="grid gap-3"></div>
            </div>
        </main>
    </div>

    <div id="modal-pren" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="w-full max-w-[350px] p-8 rounded-xl bg-[#0a0a0a] border border-red-500/30">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">TAVOLO</h2>
            <div class="space-y-4">
                <input type="text" id="p-nome" class="w-full p-3 rounded bg-white/5 border border-white/10" placeholder="Nome Prenotazione">
                <input type="time" id="p-ora" class="w-full p-3 rounded bg-white/5 border border-white/10">
                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-3 text-xs bg-white/5 rounded">ANNULLA</button>
                    <button onclick="submitPrenotazione()" class="flex-1 btn-primary p-3 text-xs rounded font-bold">CONFERMA</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCG0-J2wxZGSz6eDh_E-aAe2uvpTGLmXz0",
            authDomain: "prenotazioninegozio-65eb1.firebaseapp.com",
            projectId: "prenotazioninegozio-65eb1",
            databaseURL: "https://prenotazioninegozio-65eb1-default-rtdb.europe-west1.firebasedatabase.app",
            appId: "1:466874129336:web:fd07925523c35921fe8d4d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let selectedTavolo = null;
        let isRegistrazione = false;

        function toggleAuthMode() {
            isRegistrazione = !isRegistrazione;
            document.getElementById('reg-nome').classList.toggle('hidden', !isRegistrazione);
            document.getElementById('auth-title').innerText = isRegistrazione ? 'REGISTRATI' : 'ACCEDI';
        }

        function handleAuthSubmit() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(isRegistrazione) {
                auth.createUserWithEmailAndPassword(email, pass).then(r => {
                    db.ref('utenti/' + r.user.uid).set({ nome: document.getElementById('reg-nome').value });
                }).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Errore: " + e.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                db.ref('utenti/' + user.uid).once('value', s => {
                    document.getElementById('display-nome').innerText = s.val()?.nome || 'Utente';
                });
                db.ref('prenotazioni').on('value', s => render(s.val() || {}));
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function render(data) {
            const prenotazioni = Object.values(data);
            const grid = document.getElementById('grid-tavoli');
            grid.innerHTML = '';
            
            for(let i=1; i<=16; i++) {
                const p = prenotazioni.find(x => x.tavolo == i);
                const div = document.createElement('div');
                div.className = `tavolo-item aspect-square rounded-lg flex flex-col items-center justify-center ${p ? 'bg-red-500/20 border-red-500/50' : 'bg-white/5 hover:bg-white/10 cursor-pointer'}`;
                if(!p) div.onclick = () => { selectedTavolo = i; document.getElementById('modal-title').innerText = 'TAVOLO ' + i; document.getElementById('modal-pren').classList.remove('hidden'); };
                
                div.innerHTML = `<span class="text-[8px] text-gray-500">TAV</span><span class="text-xl font-bold">${i}</span><span class="text-[7px] text-red-500">${p ? p.orario : 'LIBERO'}</span>`;
                grid.appendChild(div);
            }

            const mie = prenotazioni.filter(x => x.utenteId === auth.currentUser.uid);
            document.getElementById('count-pre').innerText = mie.length;
            const lista = document.getElementById('lista-prenotazioni');
            lista.innerHTML = mie.map(p => `
                <div class="p-4 bg-white/5 border border-white/10 rounded-lg flex justify-between items-center">
                    <div><p class="text-xs font-bold">Tavolo ${p.tavolo} - ${p.nome}</p><p class="text-[10px] text-gray-500">${p.orario}</p></div>
                    <button onclick="cancella('${p.id}')" class="text-red-500 text-xs">ELIMINA</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function submitPrenotazione() {
            const nome = document.getElementById('p-nome').value;
            const ora = document.getElementById('p-ora').value;
            if(!nome || !ora) return alert("Inserisci nome e ora");

            const id = Date.now();
            console.log("Tentativo di prenotazione...");
            
            db.ref('prenotazioni/' + id).set({
                id, tavolo: selectedTavolo, nome, orario: ora, utenteId: auth.currentUser.uid
            })
            .then(() => {
                console.log("Successo!");
                closeModal();
                document.getElementById('p-nome').value = '';
            })
            .catch(error => {
                console.error("Errore Firebase:", error);
                alert("Errore durante la prenotazione: " + error.message);
            });
        }

        function closeModal() { document.getElementById('modal-pren').classList.add('hidden'); }
        function switchTab(t) {
            document.getElementById('view-tavoli').classList.toggle('hidden', t !== 'tavoli');
            document.getElementById('view-prenotazioni').classList.toggle('hidden', t !== 'prenotazioni');
            document.getElementById('tab-tav').classList.toggle('active', t === 'tavoli');
            document.getElementById('tab-pre').classList.toggle('active', t === 'prenotazioni');
        }
        function cancella(id) { if(confirm("Cancello?")) db.ref('prenotazioni/'+id).remove(); }
        function logout() { auth.signOut(); }
        lucide.createIcons();
    </script>
</body>
</html>
